models:
  - name: "org"
    path: "D:/Workspace/onnx_modi/modified_nano.onnx"
    type: "yolox"
    nms_applied: false
    conf_threshold: null
    iou_threshold: null
    class_thresholds: null
    strides: [8, 16]

preprocess:
  crop:
    enabled: false
    region: [0.0, 0.0, 1.0, 1.0]
  resize:
    method: "INTER_LINEAR"
    input_size: null

postprocess:
  conf_threshold: 0.25
  iou_threshold: 0.45
  class_thresholds: {}

output:
  save_video: true
  save_json: false
  display: true
  output_dir: "output/"

comparison:
  mode: "overlay"
  metrics: ["cosine_similarity", "precision", "recall", "inference_time"]

class_names: null

video:
  codec: "mp4v"
  preserve_fps: true
