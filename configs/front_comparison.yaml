models:
  - name: "org"
    path: "D:/History/D22_4K/torch_native_qat/export.onnx"
    type: "yolov8"
    nms_applied: false
    conf_threshold: null
    iou_threshold: null
    class_thresholds: null

preprocess:
  crop:
    enabled: true
    region: [0.0, 0.0, 1.0, 0.94814814814814814814814814814815]
  resize:
    method: "INTER_LINEAR"
    input_size: null

postprocess:
  conf_threshold: 0.25
  iou_threshold: 0.45
  class_thresholds: {}

output:
  save_video: false
  save_json: false
  display: true
  output_dir: "output/"

comparison:
  mode: "overlay"
  metrics: ["cosine_similarity", "precision", "recall", "inference_time"]

class_names: null

video:
  codec: "mp4v"
  preserve_fps: true
